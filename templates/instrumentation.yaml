{{- if .Values.instrumentation.enabled }}
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: {{ .Values.applicationName }}-instrumentation
  namespace: {{ .Values.namespace }}
spec:
  exporter:
    endpoint: {{ .Values.instrumentation.exporterEndpoint | default "http://agent-backend.vektor-prod.svc.cluster.local:4317" }}
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_always_on
{{- end }}
